<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Explorer</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <div class="sidebar">

        <h1>Mini TMS</h1>

        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="loads.html">Loads</a></li>
            <li><a href="customers.html">Customers</a></li>
            <li><a href="carriers.html">Carriers</a></li>
            <li><a href="users.html">Users</a></li>
            <li><a href="api-explorer.html" class="active-link">API Explorer</a></li>
        </ul>

    </div>

    <div class="main-content">

        <h1 class="page-title">
            API Explorer
        </h1>

        <div class="table-container">

            <label>
                Method
            </label>

            <br><br>

            <select id="method-select">

                <option value="GET">
                    GET
                </option>

                <option value="POST">
                    POST
                </option>

                <option value="PATCH">
                    PATCH
                </option>

                <option value="DELETE">
                    DELETE
                </option>

            </select>

            <br><br>

            <label>
                Endpoint
            </label>

            <br><br>

            <select id="endpoint-select">

                <option value="/loads">
                    /loads
                </option>

                <option value="/customers">
                    /customers
                </option>

                <option value="/carriers">
                    /carriers
                </option>

                <option value="/users">
                    /users
                </option>

                <option value="/loads/L1001">
                    /loads/L1001
                </option>

                <option value="/customers/1">
                    /customers/1
                </option>

                <option value="/carriers/1">
                    /carriers/1
                </option>

                <option value="/users/1">
                    /users/1
                </option>

            </select>

            <br><br>

            <label>
                Request Body (JSON)
            </label>

            <br><br>

            <textarea
                id="request-body"
                rows="15"
                style="width:100%;"
                placeholder='{
  "name": "Example"
}'
            ></textarea>

            <br><br>

            <button
                class="btn"
                onclick="runEndpoint()"
            >
                Execute
            </button>

            <br><br>

            <div class="terminal-header">
                API Response
            </div>

            <pre id="api-response">

Select an endpoint and click Execute.

            </pre>

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api-explorer.js"></script>

</body>
</html>
