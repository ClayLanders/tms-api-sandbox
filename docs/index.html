<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini TMS Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="container">

    <div class="sidebar">

        <img
        src="images/TMSsandbox.png"
        alt="TMS API Sandbox"
        class="sidebar-logo"
        >

        <ul>
            <li><a href="index.html" class="active-link">Dashboard</a></li>
            <li><a href="loads.html">Loads</a></li>
            <li><a href="customers.html">Customers</a></li>
            <li><a href="carriers.html">Carriers</a></li>
            <li><a href="users.html">Users</a></li>
            <li><a href="api-explorer.html">API Explorer</a></li>
        </ul>

    </div>

    <div class="main-content">

        <h1 class="page-title">Dashboard</h1>

        <div class="card-container">

            <div class="card">
                <h2>Open Loads</h2>
                <p id="open-loads">0</p>
            </div>

            <div class="card">
                <h2>Covered Loads</h2>
                <p id="covered-loads">0</p>
            </div>

            <div class="card">
                <h2>In Transit</h2>
                <p id="in-transit-loads">0</p>
            </div>

            <div class="card">
                <h2>Delivered</h2>
                <p id="delivered-loads">0</p>
            </div>

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
